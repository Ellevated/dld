extends: default

ignore: |
  ai/
  node_modules/
  template/
  .pytest_cache/
  .ruff_cache/
  .worktrees/
  scripts/vps/venv/
  scripts/vps/logs/

rules:
  line-length:
    max: 120
    level: warning
  document-start: disable
  new-line-at-end-of-file: disable
  truthy:
    allowed-values: ['true', 'false', 'on']

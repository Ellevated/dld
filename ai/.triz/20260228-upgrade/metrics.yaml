      - "template/.claude/skills/ (all 39 files)"
      - "template/.claude/agents/ (all 64 files)"
      - "template/.claude/rules/ (all 5 files)"
      - "template/.claude/scripts/ (all 13 files except upgrade.mjs implied)"

  # ─────────────────────────────────────────────────────────────
  # UPGRADE-SPECIFIC RISK INVENTORY
  # ─────────────────────────────────────────────────────────────
  upgrade_specific_findings:

    file_operations:
      write_paths:
        - operation: "cpSync(src, dst)"
          trigger: "apply() function, called for each target file"
          behavior: "Overwrites without backup. No temp-copy-then-rename. No rollback."
          safety: "NONE — silent destructive overwrite"

        - operation: "writeFileSync(.dld-version)"
          trigger: "After apply() with applied.length > 0 AND errors.length === 0"
          behavior: "Partial apply (some errors) does NOT update .dld-version. Version stays stale."
          safety: "PARTIAL — version not updated on partial failure"

        - operation: "mkdirSync(dirname(dst), { recursive: true })"
          trigger: "Before each cpSync"
          behavior: "Creates directory tree silently. No check if directory was intentionally absent."
          safety: "LOW"

      delete_paths:
        - operation: "rmSync(tempCloneRoot, { recursive: true, force: true })"
          trigger: "finally block after all operations"
          behavior: "Cleans /tmp/dld-upgrade-{timestamp}. Safe — temp dir only."
          safety: "SAFE"

      no_delete_of_user_files:
        note: "user_only files (in user's .claude/ but not in template/) are detected and reported but NEVER deleted. No cleanup of removed template files."
        implication: "Stale/removed agent prompts or skills accumulate in user projects across upgrades. Zombie files persist."

    dirty_check_edge_cases:
      implementation: "git diff --quiet HEAD → exit 0 (clean) or exit 1 (dirty)"
      passes_on:
        - "Untracked files (intentional — fix in commit 9a5d738)"
        - "Staged but not committed files: NO — 'git diff HEAD' includes staged changes"
        - "Repos with no commits: returns false (not a git repo path) — upgrade allowed"
        - "Detached HEAD: works correctly"
        - "Submodules: only checks parent repo, not submodules"
      blocks_on:
        - "Modified tracked files"
        - "Staged changes"

    version_tracking:
      file: ".dld-version"
      current_state: "NOT FOUND in project root — no version baseline exists"
      version_string: "Hardcoded '3.9.0' in writeVersion(). Not derived from git tag or package.json."
      skip_field: "Written as skip: [] but NEVER READ by analyze() or apply(). Dead code."
      template_commit: "Captured from git rev-parse HEAD of cloned repo — accurate for --latest, unreliable for --local (uses project dir HEAD)"
      implication: "No way to know which files were previously skipped. No upgrade history."

    self_upgrade_risk:
      description: "upgrade.mjs is in .claude/scripts/ → UPGRADE_SCOPE → scripts-claude group → SAFE_GROUPS → auto-applied"
      behavior: "upgrade.mjs overwrites itself silently during 'apply safe' step"
      safety_mechanism: "Node.js loads script to memory before execution — current run completes with old logic"
      risk: "Next run uses new (possibly breaking) logic with no diff shown to user. User approved 'scripts-claude' group, not specific files."

    hooks_bypass:
      description: "All DLD safety hooks fire on Claude's Edit/Write/MultiEdit tool calls (PostToolUse matcher)"
      upgrade_mechanism: "cpSync() runs inside Bash subprocess — not a Claude tool call"
      consequence: "pre-edit hook (protected paths, sync zone warnings, LOC limits) is fully bypassed during upgrade"
      consequence2: "post-edit hook (ADR validation, diary recording) is also bypassed"
      affected_protections:
        - "Sync zone reminders (would warn about template/ mismatch)"
        - "Protected path enforcement (tests/contracts/, tests/regression/)"
        - "LOC limit enforcement"

    hooks_config_overwrite_risk:
      file: ".claude/hooks/hooks.config.mjs"
      current_status: "DIFFERS from template (different SHA256)"
      protected: false
      group: "hooks"
      in_safe_groups: true
      consequence: "User's hooks.config.mjs customizations will be silently overwritten on next 'apply safe' run"
      mitigation_exists: "hooks.config.local.mjs IS protected — users must know to use it"
      documentation_quality: "README.md mentions hooks.config.local.mjs but upgrade SKILL.md does not warn about this"

    skills_review_burden:
      total_skills_files: 39
      group: "skills"
      in_safe_groups: false
      review_process: "Per-file diff + 3-option prompt (take/keep/skip)"
      cognitive_load: "HIGH — 39 files × (read diff + decide) per upgrade"
      churn_rate: "HIGH — spark/bug-mode.md changed 29x in 6 months"
      implication: "High-churn files require frequent manual review. Upgrade fatigue likely → users skip reviews → stale skills."

    out_of_scope_drift:
      files_not_upgraded:
        - "template/ai/installation-guide.md (changed 5x in 6 months)"
        - "template/ai/ARCHITECTURE.md"
        - "template/.mcp.json.example"
        - "template/CLAUDE.md (28 changes — most-changed file, PROTECTED)"
      consequence: "User's ai/ directory and project CLAUDE.md never receive framework updates. Version-referenced content diverges silently."

    partial_apply_version_bug:
      scenario: "Apply runs, 8/10 files succeed, 2 fail (permissions, disk)"
      writeVersion_called: false
      consequence: ".dld-version not updated. User cannot tell what was applied. Re-running apply may skip already-applied files (sha256 match) but version still wrong."
      note: "Actually re-running IS idempotent (sha256 stops re-applying matching files). But partial state is invisible."

    network_dependency:
      default_mode: "GitHub clone (depth=1 sparse checkout)"
      failure_modes:
        - "No internet → error, user told to retry or --local"
        - "GitHub down → blocked"
        - "Rate limiting → blocked"
        - "MITM → malicious template injected (no signature verification)"
      signature_verification: "NONE — git clone over HTTPS only, no gpg/sha verification of template content"

    localization_md_asymmetry:
      template_version: "Spanish triggers (placeholder template)"
      user_dld_version: "Russian triggers (DLD-specific customization)"
      protected: true
      note: "Correct — localization.md is in PROTECTED. But template's localization.md has Spanish placeholder that new users get, requiring manual setup."

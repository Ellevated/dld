  # ─────────────────────────────────────────────────────────────
  # ARCHITECTURE CONTEXT
  # ─────────────────────────────────────────────────────────────
  architecture:
    structure: |
      upgrade.mjs flow:
        1. isGitDirty() check (git diff --quiet HEAD — tracked files only)
        2. Source resolution: --local (template/) | --latest (GitHub clone to /tmp)
        3. analyze(): walkDir + sha256 comparison → {identical, new_files, different, protected, user_only}
        4. UPGRADE_SCOPE filter: only .claude/** and scripts/**
        5. apply(): cpSync() per file, writeVersion() on success
        6. Cleanup: rmSync(tempCloneRoot)

      PROTECTED set (15 entries):
        CLAUDE.md, README.md, .gitignore, pyproject.toml, package.json,
        Cargo.toml, go.mod, requirements.txt
        .claude/rules/localization.md
        .claude/rules/template-sync.md
        .claude/rules/git-local-folders.md
        .claude/CUSTOMIZATIONS.md
        .claude/settings.local.json
        .claude/hooks/hooks.config.local.mjs
        [NOTE: hooks.config.mjs is NOT protected]

      ALWAYS_ASK set (1 entry):
        .claude/settings.json

      SAFE_GROUPS (auto-apply without confirmation):
        agents, hooks, hook-tests, rules, scripts-claude, scripts-bash

      NOT SAFE (require per-file manual review):
        skills, settings, other

      UPGRADE_SCOPE predicate:
        f.startsWith('.claude/') || f.startsWith('scripts/')
        Excludes: ai/, CLAUDE.md, README.md, pyproject.toml, .mcp.json.example

      .dld-version tracking:
        - Written ONLY after apply with 0 errors
        - Contains hardcoded version string ('3.9.0') — not derived from git tag
        - Has skip: [] field that is written but never READ by upgrade.mjs
        - No version used in any gating logic during analyze

    import_rules: |
      upgrade.mjs dependencies:
        - child_process: execSync, execFileSync (git commands, git diff)
        - crypto: createHash (sha256 comparison)
        - fs: existsSync, readFileSync, writeFileSync, mkdirSync, cpSync, rmSync, readdirSync
        - path: join, relative, dirname
      No external npm dependencies. Entirely Node.js stdlib.

    known_constraints: |
      ADR-011: Enforcement as Code — upgrade.mjs is the enforcement mechanism itself.
               But upgrade.mjs has zero tests, contradicting this ADR's intent.

      CRITICAL: upgrade.mjs is in UPGRADE_SCOPE (.claude/scripts/) and in SAFE_GROUPS
               (scripts-claude). Therefore upgrade.mjs can overwrite itself during
               auto-apply. Node.js loads the script into memory before execution,
               so the current run completes safely — but the NEXT run uses new logic.
               This is a silent self-modification pattern with no warning to user.

      CRITICAL: pre-edit hook (which enforces sync-zone warnings and protected paths)
               is BYPASSED during upgrade. cpSync() is a Node.js fs call inside a
               Bash subprocess — it never triggers PostToolUse hook on Edit/Write.
               Result: upgrade bypasses DLD's own safety layer.

      hooks.config.mjs divergence: User's copy DIFFERS from template (different SHA256).
               hooks.config.mjs is in 'hooks' group = SAFE_GROUPS = auto-applied.
               User will lose their hooks config customizations silently on next upgrade
               unless they use hooks.config.local.mjs for overrides.

      .dld-version skip[] field: written but never read. Declared intent to support
               skip-list is unimplemented. Users cannot pin files across upgrades.

    dependency_graph: |
      Claude (SKILL.md prompt)
        └─→ Bash: node upgrade.mjs --analyze
              └─→ walkDir(template/) + sha256 comparison
        └─→ Bash: node upgrade.mjs --apply --groups safe,new
              └─→ cpSync(template/file → project/file)  [bypasses hooks]
              └─→ writeFileSync(.dld-version)
        └─→ Bash: node upgrade.mjs --diff --file X
              └─→ execFileSync('git', ['diff', '--no-index', ...])

      upgrade.mjs clones from: github.com/Ellevated/dld (depth=1, sparse)
      Temp dir: /tmp/dld-upgrade-{timestamp}/ (cleaned in finally block)

      hooks (pre-edit, post-edit) — NOT in upgrade path
      hooks (pre-bash) — fires on Bash calls from Claude, but upgrade.mjs
                         script execution is already permitted (no pattern block)

  # ─────────────────────────────────────────────────────────────
  # CI COVERAGE
  # ─────────────────────────────────────────────────────────────
  ci_coverage:

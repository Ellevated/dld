  findings:
    # ─── CODE REVIEWER (12 findings) ───────────────────────────────────────────

    - id: "A-CR-001"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: high
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 96
      title: "Race condition in outputJson — process.exit(0) in callback can be preempted by setTimeout"
      description: |
        The outputJson function calls process.stdout.write(data, () => process.exit(0)) and
        simultaneously schedules setTimeout(() => process.exit(0), 500) as a "safety net".
        If the pipe reader is slow or the write is large, the setTimeout fires FIRST and
        terminates the process before the write callback confirms the data reached the pipe.
        If process.stdout.write returns false (backpressure), the callback may never fire at all
        in some Node.js versions under memory pressure. The setTimeout then exits before the data
        is actually delivered. Every denyTool(), askTool(), blockPrompt(), and postBlock() call
        goes through this path. A deny that silently becomes an allow due to this race is a
        security-relevant failure.
      evidence: |
        ```javascript
        // utils.mjs:94-101
        function outputJson(data) {
          try {
            process.stdout.write(JSON.stringify(data) + '\n', () => process.exit(0));
          } catch {
            process.exit(0);
          }
          setTimeout(() => process.exit(0), 500); // safety net  <-- can fire first
        }
        ```
      fix_suggestion: "Make the write synchronous, or clear the timeout in the write callback."

    - id: "A-CR-002"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: high
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 244
      title: "minimatch() escapes bracket character classes, making [abc] patterns non-functional"
      description: |
        The custom glob-to-regex translator escapes all characters matching [.+^${}()|\\] BEFORE
        converting glob syntax. If a user-supplied glob pattern contains [.py], it becomes [\\.py]
        inside the regex — which matches \, ., p, or y — not the intended set. The docstring
        documents [abc] as a supported feature, making this a documentation-confirmed contract
        violation and latent bug.
      evidence: |
        ```javascript
        // utils.mjs:244-254
        function minimatch(str, pattern) {
          let re = pattern
            .replace(/[.+^${}()|\\]/g, '\\$&')   // escapes . + ^ $ { } ( ) | \
            .replace(/\*\*/g, '\x00GLOBSTAR\x00')
            ...
        // Pattern [.py] becomes [\\.py] — matches \, ., p, y — not literal set .py
        ```
      fix_suggestion: "Extract and protect bracket expressions before escaping special characters."

    - id: "A-CR-003"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: high
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 395
      title: "getProjectDir() path-traversal check trusts /tmp prefix — allows any /tmp/* path"
      description: |
        getProjectDir() validates that CLAUDE_PROJECT_DIR resolves to a path under homedir() OR
        under /tmp. An attacker or misconfigured environment that sets CLAUDE_PROJECT_DIR=/tmp/attacker-dir
        would cause loadConfig() to attempt importing /tmp/attacker-dir/.claude/hooks/hooks.config.local.mjs
        as trusted config. Since this is a dynamic ESM import, it executes arbitrary JavaScript.
        The /tmp exception was likely added for CI environments, but creates meaningful attack surface
        on multi-user systems.
      evidence: |
        ```javascript
        // utils.mjs:391-399
        export function getProjectDir() {
          const dir = process.env.CLAUDE_PROJECT_DIR || process.cwd();
          const resolved = resolve(dir);
          const home = homedir();
          if (!resolved.startsWith(home) && !resolved.startsWith('/tmp')) {
            return process.cwd();
          }
          return resolved;  // /tmp/anything passes through
        }
        ```
      fix_suggestion: "Restrict to homedir() only for config loading, or validate that the resolved path is a git repository root before accepting it."

    - id: "A-CR-004"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 191
      title: "loadConfig() module-level cache (_config) permanently caches failures as empty object"
      description: |
        When loadConfig() fails and catches an exception (line 212), it sets _config = {} — an
        empty object — and returns it. Any subsequent call sees _config = {} (truthy as an object)
        and returns {} immediately. If hooks.config.mjs throws on first load (parse error during
        development), _config = {} and all subsequent calls return {} silently, with no way to
        diagnose this without checking the error log.
      evidence: |
        ```javascript
        // utils.mjs:191-215
        let _config = null;
        export async function loadConfig() {
          if (_config) return _config;  // {} is truthy — cached failure indistinguishable
          try { ... } catch {
            _config = {};  // error cached permanently
            return _config;
          }
        }
        ```
      fix_suggestion: "Use a sentinel value to distinguish 'not yet loaded' from 'loaded empty'."

    - id: "A-CR-005"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/pre-bash.mjs"
      line: 63
      title: "Merge pattern --ff-only bypass uses string-contains check — bypassable with --no-ff combined flag"
      description: |
        The --ff-only check uses command.includes('--ff-only') as the only guard. A user who runs
        'git merge --no-ff develop --ff-only' has the string contain '--ff-only' so the hook
        approves it, even though --no-ff takes precedence (last flag wins in git). This is a logic
        bypass: the user can force a non-ff merge and the hook approves it.
      evidence: |
        ```javascript
        // pre-bash.mjs:63-73
        if (command.includes('--ff-only')) continue;  // bypass via string contains
        // git merge --no-ff develop --ff-only  <-- bypasses this check
        ```
      fix_suggestion: "Replace with: if (command.includes('--ff-only') && !command.includes('--no-ff')) continue;"

    - id: "A-CR-006"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/pre-edit.mjs"
      line: 149
      title: "absPath construction for LOC check uses process.cwd() instead of getProjectDir()"
      description: |
        The LOC limit check constructs absPath using process.cwd() for relative paths, but
        normalizePath() uses getProjectDir(). In worktree scenarios where cwd differs from the
        project root, existsSync() may look in the wrong directory, return false, and silently
        skip the entire LOC check.
      evidence: |
        ```javascript
        // pre-edit.mjs:149
        const absPath = filePath.startsWith('/') ? filePath : join(process.cwd(), filePath);
        //                                                         ^^^^^^^^^^^^^^^^^
        //              Uses cwd(), not getProjectDir() — inconsistent with normalizePath()
        ```
      fix_suggestion: "Use join(getProjectDir(), filePath) instead of join(process.cwd(), filePath)."

    - id: "A-CR-007"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/prompt-guard.mjs"
      line: 48
      title: "SKILL_INDICATORS tested against promptLower without /i flag — fragile case dependency"
      description: |
        SKILL_INDICATORS patterns lack the /i flag but are tested against the already-lowercased
        promptLower. Correctness depends on the implicit case normalization — fragile design where
        correctness depends on an undocumented interaction. COMPLEXITY_PATTERNS use /i flag
        redundantly. Makes future pattern additions error-prone.
      evidence: |
        ```javascript
        // prompt-guard.mjs:43-56
        const promptLower = prompt.toLowerCase();
        for (const indicator of SKILL_INDICATORS) {
          if (indicator.test(promptLower)) {  // SKILL_INDICATORS have no /i flag
        for (const pattern of COMPLEXITY_PATTERNS) {
          if (pattern.test(promptLower)) {  // COMPLEXITY_PATTERNS have /i flag — redundant
        ```
      fix_suggestion: "Make approach consistent: either test all patterns against raw prompt with /i flag, or test against promptLower and remove /i from COMPLEXITY_PATTERNS."

    - id: "A-CR-008"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 271
      title: "extractAllowedFiles regex fails to extract paths containing spaces, parentheses, or special chars"
      description: |
        The path extraction regex [a-zA-Z0-9_./@*-]+ does not allow spaces, parentheses, or other
        common filesystem characters. A path like 'src/auth/handler (v2).py' would be extracted as
        'src/auth/handler' (stops at space), making the file not in allowedFiles — hook denies edits
        to it when it should allow them. This is a false-positive denial.
      evidence: |
        ```javascript
        // utils.mjs:271
        /[`*\-]*\s*([a-zA-Z0-9_./@*-]+(?:\.[a-zA-Z0-9*]+)?(?::\d+(?:-\d+)?)?)[`*]*/
        // "- `src/auth/handler (v2).py`" → captures only "src/auth/handler"
        ```
      fix_suggestion: "Try backtick-delimited path extraction first: const btMatch = trimmed.match(/`([^`]+)`/);"

    - id: "A-CR-009"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: medium
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 129
      title: "approvePrompt() sends JSON output via async write path — inconsistent with allowTool() silent exit"
      description: |
        allowTool() uses process.exit(0) directly (no JSON). approvePrompt() calls
        outputJson({ decision: 'approve' }) which goes through the async write path with the
        race condition from CR-001. approvePrompt() is called on EVERY non-blocked prompt —
        the most common code path runs through the unreliable async write on every single prompt.
      evidence: |
        ```javascript
        export function allowTool() { process.exit(0); }  // Silent exit
        export function approvePrompt() { outputJson({ decision: 'approve' }); }  // Async path
        ```
      fix_suggestion: "If the Claude Code protocol accepts silent exit for UserPromptSubmit approval, change approvePrompt() to use process.exit(0)."

    - id: "A-CR-010"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: low
      category: "logic"
      file: ".claude/hooks/utils.mjs"
      line: 213
      title: "Comment typo — missing slash on line 213 creates a division expression instead of comment"
      description: |
        Line 213 contains: return _config; / fail-safe: no config = hardcoded defaults remain
        This is a comment missing the second '/'. The division expression is dead code (return
        exits before it), but it signals the line was never tested in strict mode context.
      evidence: |
        ```javascript
        // utils.mjs:212-214
        _config = {};
        return _config; / fail-safe: no config = hardcoded defaults remain
        //             ^ Missing second / — division expression, not a comment
        ```
      fix_suggestion: "Fix: return _config; // fail-safe: no config = hardcoded defaults remain"

    - id: "A-CR-011"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: low
      category: "logic"
      file: ".claude/hooks/validate-spec-complete.mjs"
      line: 43
      title: "spec file existence check uses relative path without project root resolution"
      description: |
        existsSync(specFile) is called with a relative path from git diff output. In worktree
        scenarios where cwd() is not the main repo root, this resolves to the wrong directory,
        returns false, and the spec validation is silently skipped — the entire Impact Tree check
        becomes a no-op.
      evidence: |
        ```javascript
        // validate-spec-complete.mjs:39-44
        const specFile = stagedFiles.split('\n').find(f => /^ai\/features\/.*\.md$/.test(f));
        if (specFile && existsSync(specFile)) {  // relative path, wrong in worktrees
        ```
      fix_suggestion: "Import getProjectDir() and use join(projectRoot, specFile) before existsSync."

    - id: "A-CR-012"
      zone: "Zone A"
      persona: "code-reviewer"
      severity: low
      category: "logic"
      file: ".claude/hooks/hooks.config.mjs"
      line: 52
      title: "Force-push regex negative lookahead misses --force-with-lease=ref form"
      description: |
        The regex --force\\b(?!-with-lease) does not cover --force-with-lease=<refname> (equals
        form). Also, 'git push --force --force-with-lease origin develop' is blocked even though
        the effective intent is --force-with-lease (which should be allowed), creating an
        inconsistency where the same effective operation is blocked in one flag ordering and
        allowed in another.
      evidence: |
        ```javascript
        // hooks.config.mjs:52
        /git\s+push\b(?=.*\b(develop|main)\b)(?=.*(-f\b|--force\b(?!-with-lease)))/i
        ```
      fix_suggestion: "Replace regex with a structured parser that checks: if --force-with-lease appears anywhere, allow it."

    # ─── SECURITY AUDITOR (13 findings) ────────────────────────────────────────

    - id: "A-SEC-001"
      zone: "Zone A"
      persona: "security-auditor"
      severity: high
      category: "auth"
      file: ".claude/hooks/utils.mjs"
      line: 395
      title: "Path traversal bypass via symlink in getProjectDir() — resolve() does not follow symlinks"
      description: |
        getProjectDir() uses startsWith() to validate paths. resolve() uses lexical path
        normalization, NOT fs.realpathSync(). A symlink at $HOME/project -> /etc would pass the
        guard. On systems where home is a short path (e.g., /tmp/u), a directory named /tmp/u-evil
        passes startsWith('/tmp/u'). The function returns the path which is then used for dynamic
        ESM import of hooks.config.local.mjs — executing arbitrary JavaScript.
      evidence: |
        ```javascript
        // utils.mjs:391-399
        export function getProjectDir() {
          const resolved = resolve(dir);  // lexical only, symlinks not followed
          if (!resolved.startsWith(home) && !resolved.startsWith('/tmp')) { ... }
          return resolved;  // symlinks still active
        }
        ```
      fix_suggestion: "Use fs.realpathSync() instead of resolve(). Append path separator for prefix checks: resolved.startsWith(home + path.sep)"

    - id: "A-SEC-002"
      zone: "Zone A"
      persona: "security-auditor"
      severity: high
      category: "auth"
      file: ".claude/hooks/pre-edit.mjs"
      line: 111
      title: "Attacker-controlled spec path via CLAUDE_CURRENT_SPEC_PATH env var bypasses file allowlist"
      description: |
        pre-edit.mjs reads CLAUDE_CURRENT_SPEC_PATH directly from environment and passes it to
        isFileAllowed() -> extractAllowedFiles() which calls readFileSync(specPath) with NO
        validation that specPath is within the project directory. Setting
        CLAUDE_CURRENT_SPEC_PATH=/etc/passwd causes readFileSync to read /etc/passwd. Since no
        '## Allowed Files' section is found, files.length === 0, and isFileAllowed() returns
        {allowed: true} — ALL file-write protections are bypassed.
      evidence: |
        ```javascript
        // pre-edit.mjs:111
        const specPath = process.env.CLAUDE_CURRENT_SPEC_PATH || inferSpecFromBranch();
        // utils.mjs:259
        const content = readFileSync(specPath, 'utf-8');  // no path validation
        // utils.mjs:365-367
        if (result.files.length === 0) {
          return { allowed: true };  // No section = allow all
        }
        ```
      fix_suggestion: "Validate specPath: resolve with realpathSync, assert it starts with getProjectDir()/ai/features/, assert it ends with .md."

    - id: "A-SEC-003"
      zone: "Zone A"
      persona: "security-auditor"
      severity: high
      category: "injection"
      file: ".claude/hooks/post-edit.mjs"
      line: 27
      title: "Argument injection into ruff via unsanitized filePath from hook input"
      description: |
        post-edit.mjs calls execFileSync('ruff', ['format', filePath]) where filePath is taken
        from Claude tool_input JSON. While execFileSync with an array prevents shell injection,
        ruff interprets arguments starting with '--' as flags. A filePath of '--config=/tmp/evil.toml'
        would be passed as a ruff CLI flag. The existsSync check prevents most cases but paths
        with embedded flag-like strings may still be exploitable.
      evidence: |
        ```javascript
        // post-edit.mjs:27
        execFileSync('ruff', ['format', filePath], { timeout: RUFF_TIMEOUT_MS, stdio: 'pipe' });
        // filePath = '--unsafe-fixes' would pass as a ruff flag
        ```
      fix_suggestion: "Add explicit argument sanitization: if (filePath.startsWith('-')) { postContinue(); return; }"

    - id: "A-SEC-004"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "exposure"
      file: ".claude/hooks/utils.mjs"
      line: 51
      title: "Attacker-controlled log file path via DLD_HOOK_LOG_FILE env var — arbitrary file append"
      description: |
        debugLog() writes to a file specified by DLD_HOOK_LOG_FILE with no path validation.
        An attacker who controls DLD_HOOK_LOG_FILE can redirect debug output to any writable file
        (e.g., appending to ~/.bashrc, ~/.ssh/authorized_keys, ~/.gitconfig) since writes use
        {flag: 'a'} (append mode). The JSON content is not fully attacker-controlled but file
        corruption occurs.
      fix_suggestion: "Validate LOG_FILE at startup — it must be an absolute path within $HOME or /tmp, must not be a symlink."

    - id: "A-SEC-005"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "auth"
      file: ".claude/hooks/hooks.config.mjs"
      line: 26
      title: "Push-to-main regex has edge cases with complex refspecs"
      description: |
        The regex that blocks 'git push ... main' is generally robust but has edge cases with
        refspec ranges (e.g., 'git push origin main..') and URL-like arguments. The lookahead/
        lookbehind construction handles most cases but complex scenarios remain untested.
      fix_suggestion: "Replace with a structured command parser that splits git push arguments and checks the destination refspec explicitly."

    - id: "A-SEC-006"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "auth"
      file: ".claude/hooks/hooks.config.mjs"
      line: 15
      title: "isDestructiveClean() does not block 'git clean -fx' — destroys ignored files without warning"
      description: |
        The function detects destructive 'git clean' by requiring BOTH force (-f) AND directory (-d)
        flags. 'git clean -fx' (force + remove ignored files, no -d) satisfies hasForce=true but
        hasDir=false, so isDestructiveClean returns false and allows the command. This deletes all
        ignored files including .env secrets without any safety prompt.
      evidence: |
        ```javascript
        function isDestructiveClean(cmd) {
          const hasForce = ...;
          const hasDir = /(?:^|\s)-[a-z]*d/i.test(cmd);  // -x alone is not caught
          return hasForce && hasDir;
        }
        // git clean -fx: hasForce=true, hasDir=false → returns false → ALLOWED
        ```
      fix_suggestion: "Expand detection: const hasX = /(?:^|\\s)-[a-z]*x/i.test(cmd); return hasForce && (hasDir || hasX);"

    - id: "A-SEC-007"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "auth"
      file: ".claude/hooks/utils.mjs"
      line: 260
      title: "ReDoS vulnerability in extractAllowedFiles() regex on large spec files"
      description: |
        The regex /## Allowed Files\s*\n([\s\S]*?)(?=\n##|\s*$)/i has potential for catastrophic
        backtracking with [\s\S]*? combined with \s*$. On a 50KB spec file where Allowed Files is
        the last section, every character from that point to EOF must be tried against the alternation.
        Hook timeout leads to fail-safe mode where all file writes are allowed.
      fix_suggestion: "Rewrite regex: /## Allowed Files\s*\n(.*?)(?=\n##|$)/is or split on section headers first."

    - id: "A-SEC-008"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "auth"
      file: ".claude/hooks/pre-edit.mjs"
      line: 134
      title: "Protected path check ordering — always-allowed patterns bypass protected path enforcement"
      description: |
        The always-allowed check in isFileAllowed() runs BEFORE protected path checks. A file in
        .claude/** (always-allowed) that also matches a protectedPath would be ALLOWED because the
        always-allowed check returns early before the protected path check is ever reached. Protected
        paths under .claude/ (non-standard layout) would not be protected.
      fix_suggestion: "Apply protected path checks BEFORE always-allowed pattern checks. Protected paths should be an absolute hard block."

    - id: "A-SEC-009"
      zone: "Zone A"
      persona: "security-auditor"
      severity: medium
      category: "auth"
      file: ".claude/hooks/prompt-guard.mjs"
      line: 44
      title: "Prompt guard complexity detection fails on non-ASCII locales due to toLowerCase()"
      description: |
        On Turkish locale, 'I'.toLowerCase() produces 'ı' (not 'i'), so COMPLEXITY_PATTERNS that
        expect Latin 'i' would not match the lowercased form. Complexity detection fails silently
        for Turkish locale users, bypassing the prompt guard entirely and allowing users to proceed
        without the intended /spark guidance.
      fix_suggestion: "Test patterns against original prompt (not lowercased); ensure all patterns include /i flag; remove redundant toLowerCase()."

    - id: "A-SEC-010"
      zone: "Zone A"
      persona: "security-auditor"
      severity: low
      category: "exposure"
      file: ".claude/hooks/utils.mjs"
      line: 35
      title: "Error log appends unsanitized error objects — potential log injection"
      description: |
        logHookError() writes: ${ts} [${hookName}]: ${error}\n — If an Error object's message
        contains newlines, log entries spanning multiple lines are written, allowing fake log entry
        injection. This is a local debug log only (chmod 600) but could confuse audit trails.
      fix_suggestion: "Sanitize: const safeError = String(error).replace(/\\n/g, ' | ');"

    - id: "A-SEC-011"
      zone: "Zone A"
      persona: "security-auditor"
      severity: low
      category: "auth"
      file: ".claude/hooks/run-hook.mjs"
      line: 35
      title: "git worktree list output parsing is brittle — malformed output silently disables all hooks"
      description: |
        run-hook.mjs parses 'git worktree list --porcelain' with output.split('\n')[0].replace('worktree ', '').trim().
        If git output is malformed (corrupted git state, unusual path names), root gets set to a
        garbage string. hookPath points to a non-existent location, hooks silently fail, and all
        blocks are bypassed (fail-open).
      fix_suggestion: "Use: const firstLine = output.split('\n').find(l => l.startsWith('worktree ')); root = firstLine?.slice('worktree '.length).trim() ?? process.cwd();"

    - id: "A-SEC-012"
      zone: "Zone A"
      persona: "security-auditor"
      severity: low
      category: "auth"
      file: ".claude/hooks/session-end.mjs"
      line: 25
      title: "session-end.mjs uses raw CLAUDE_PROJECT_DIR without getProjectDir() validation"
      description: |
        session-end.mjs reads the project directory as process.env.CLAUDE_PROJECT_DIR || process.cwd()
        without calling getProjectDir() from utils.mjs, which provides path traversal protection.
        If CLAUDE_PROJECT_DIR is set to an arbitrary path, session-end constructs an unchecked path
        and reads a file from it.
      fix_suggestion: "Import and use getProjectDir() from utils.mjs."

    - id: "A-SEC-013"
      zone: "Zone A"
      persona: "security-auditor"
      severity: low
      category: "auth"
      file: ".claude/hooks/utils.mjs"
      line: 244
      title: "minimatch() character class injection — unmatched ] in spec causes regex syntax error / DoS"
      description: |
        The path glob minimatch does not escape ] characters. An allowed file entry of 'src/]evil.py'
        in the spec produces regex ^src/]evil\\.py$ which is a syntax error. new RegExp(re) throws,
        extractAllowedFiles() catches and returns {files: [], error: true}, causing all file writes
        to be denied for this session (DoS of file write capability).
      fix_suggestion: "Wrap new RegExp(re) in try/catch within minimatch() and return false on error, rather than propagating the exception."

    # ─── UX ANALYST (15 findings) ──────────────────────────────────────────────

    - id: "A-UX-001"
      zone: "Zone A"
      persona: "ux-analyst"
      severity: high
      category: "inconsistency"
      file: ".claude/hooks/utils.mjs"
      line: 310
      title: "SEC prefix in spec inference not in CLAUDE.md backlog rules — creates silent allowlist bypass"
      description: |
        The spec inference regex at lines 310 and 320 accepts SEC as a valid task prefix, but CLAUDE.md
        explicitly states only 4 prefix types are allowed: BUG, FTR, TECH, ARCH. A SEC branch gets spec
        inference, but the spec would never legally exist in the backlog. If spec does not exist, spec
        enforcement is silently bypassed — all file edits allowed.
      fix_suggestion: "Remove SEC from the regex patterns: use /(FTR|BUG|TECH|ARCH)-\\d+/i"

    - id: "A-UX-002"
      zone: "Zone A"

    - id: "A-QA-012"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: medium
      category: "coverage-gap"
      file: ".claude/hooks/utils.mjs"
      line: 197
      title: "loadConfig: _config = {} on failure is truthy — permanently disables config retry for process lifetime"
      description: |
        When loadConfig() fails, it sets _config = {} (empty but truthy). All subsequent calls return {}
        without retrying. In tests, if a test triggers a failure and resetConfigCache() is not called,
        subsequent tests get the poisoned cache. In production, a transient config load failure
        permanently disables all custom rules for the hook process lifetime.
      evidence: |
        1. loadConfig() fails → _config = {}
        2. resetConfigCache() NOT called
        3. loadConfig() again → returns {} (no retry, _config is truthy)
      fix_suggestion: "Use a separate _configError flag or sentinel value; do not use {} for permanent failure caching."

    - id: "A-QA-013"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: medium
      category: "negative-test"
      file: ".claude/hooks/utils.mjs"
      line: 260
      title: "extractAllowedFiles regex fails on specs with CRLF line endings"
      description: |
        The section boundary lookahead (?=\\n##) does not match \\r\\n##. On Windows or specs committed
        with CRLF, the regex captures content from beyond the ## Allowed Files section boundary —
        including files listed in subsequent sections. Files from other spec sections are incorrectly
        added to the allowed list.
      evidence: |
        Spec with CRLF: "## Allowed Files\r\n`src/foo.py`\r\n\r\n## Next Section\r\n`src/bar.py`\r\n"
        Expected: files = ['src/foo.py']
        Actual: lookahead \n## fails to match \r\n## → captures everything → files = ['src/foo.py', 'src/bar.py']
      fix_suggestion: "Update lookahead: (?=\\r?\\n##|\\s*$). Normalize line endings at parse entry: content.replace(/\\r\\n/g, '\\n')"


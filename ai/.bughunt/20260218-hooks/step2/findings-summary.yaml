    - id: "A-ARCH-002"
      zone: "Zone A"
      persona: "software-architect"
      severity: high
      category: "race-condition"
      file: ".claude/hooks/utils.mjs"
      line: 94
      title: "outputJson — missing process.stdout error handler causes uncaught SIGPIPE/EPIPE crash"
      description: |
        If the parent process closes its read end of the pipe while a denyTool() response is being

    - id: "A-ARCH-007"
      zone: "Zone A"
      persona: "software-architect"
      severity: medium
      category: "cascade"
      file: ".claude/hooks/pre-bash.mjs"
      line: 29
      title: "Force push with --force-with-lease to develop still allows data loss in stale-tracking-ref scenarios"
      description: |
        git push --force-with-lease origin develop is allowed (correctly per current design). But
        --force-with-lease checks against the locally tracked remote-tracking ref, which may be stale
        if the worktree was created before CI pushed commits to develop. An autopilot rebasing in a
        worktree can overwrite CI commits on develop. The hook's protection is incomplete — it treats
        --force-with-lease as always safe, which is wrong in stale-tracking-ref scenarios.
      fix_suggestion: "Change --force-with-lease to require explicit user confirmation via askTool. The 'force-with-lease is always safe' assumption is wrong in stale-tracking-ref scenarios."

    - id: "A-ARCH-008"
      zone: "Zone A"
      persona: "software-architect"
      severity: medium
      category: "atomicity"
      file: ".claude/hooks/utils.mjs"
      line: 197
      title: "loadConfig async TOCTOU — concurrent calls can load config twice before cache is set"
      description: |
        loadConfig() is async with cache check at line 198. Between the check and the assignment,
        the module is awaiting I/O. Another concurrent caller during this gap starts a second load.
        While both produce the same result in production (single-process), in tests with
        --test-concurrency > 1, timing can cause non-deterministic test behavior if one load picks
        up a freshly written local config that the other missed.
      fix_suggestion: "Use pending-promise pattern: if (!_configPromise) _configPromise = _doLoadConfig(); return _configPromise;"

    - id: "A-ARCH-009"
      zone: "Zone A"
      persona: "software-architect"
      severity: medium
      category: "consistency"
      file: ".claude/hooks/session-end.mjs"
      line: 25
      title: "session-end uses raw process.env instead of getProjectDir() — bypasses path safety"
      description: |
        session-end.mjs uses process.env.CLAUDE_PROJECT_DIR || process.cwd() directly, bypassing
        getProjectDir() from utils.mjs which validates paths. If CLAUDE_PROJECT_DIR is set to a
        malicious path (e.g., /etc), session-end would attempt to read /etc/ai/diary/index.md.
        This is an architectural inconsistency where one hook diverges from the established safety pattern.
      fix_suggestion: "Import and use getProjectDir() from utils.mjs."

    - id: "A-ARCH-010"
      zone: "Zone A"
      persona: "software-architect"
      severity: medium
      category: "state-machine"
      file: ".claude/hooks/pre-edit.mjs"
      line: 111
      title: "Empty string CLAUDE_CURRENT_SPEC_PATH triggers branch inference instead of disabling enforcement"
      description: |
        Line 111: const specPath = process.env.CLAUDE_CURRENT_SPEC_PATH || inferSpecFromBranch()
        JavaScript's || treats empty string as falsy. If CLAUDE_CURRENT_SPEC_PATH is set to '' (empty
        string) to disable enforcement during debugging, inferSpecFromBranch() is called instead. If the
        current branch matches a task ID, the spec is found and enforcement continues — the opposite of
        what the operator intended.
      fix_suggestion: "Use explicit undefined check: const envSpec = process.env.CLAUDE_CURRENT_SPEC_PATH; const specPath = (envSpec !== undefined && envSpec !== '') ? envSpec : inferSpecFromBranch();"

    - id: "A-ARCH-011"
      zone: "Zone A"
      persona: "software-architect"
      severity: low
      category: "consistency"
      file: ".claude/hooks/prompt-guard.mjs"
      line: 18
      title: "prompt-guard does not use config — hardcoded patterns cannot be overridden by hooks.config.mjs"
      description: |
        prompt-guard.mjs has COMPLEXITY_PATTERNS and SKILL_INDICATORS defined as module-level constants
        and does NOT call loadConfig(). hooks.config.mjs defines promptGuard.complexityPatterns and
        promptGuard.skillIndicators — but the hook never reads them. The architectural contract (hooks
        read from config, config is overridable) is violated for prompt-guard specifically.
      fix_suggestion: "Add loadConfig() call and use config values: const complexityPatterns = config?.promptGuard?.complexityPatterns || COMPLEXITY_PATTERNS;"

    - id: "A-ARCH-012"
      zone: "Zone A"
      persona: "software-architect"
      severity: low
      category: "consistency"
      file: ".claude/hooks/pre-edit.mjs"
      line: 74
      title: "When a file is both near LOC limit AND in a sync zone, only LOC warning fires — sync reminder dropped"
      description: |
        When a .claude/ file is both over LOC warn threshold AND in a sync zone (exists in
        template/.claude/), the LOC warning fires first (step 3) and returns early. The sync zone
        reminder (step 4) is never reached. Developer edits .claude/hooks/utils.mjs without seeing
        the sync reminder — creating divergence between the two copies without notification.
      fix_suggestion: "Collect all soft warnings into an array and join them into a single askTool call: if (warnings.length > 0) { askTool(warnings.join('\n\n---\n\n')); return; }"

    - id: "A-ARCH-013"
      zone: "Zone A"
      persona: "software-architect"
      severity: low
      category: "coupling"

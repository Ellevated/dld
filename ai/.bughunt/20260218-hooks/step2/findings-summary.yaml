        returns false and spec inference silently returns null. With ARCH-003 (cwd vs CLAUDE_PROJECT_DIR
        inconsistency), spec enforcement is silently disabled in autopilot worktree scenarios.
      fix_suggestion: "Use getProjectDir() as base: const dir = join(getProjectDir(), 'ai', 'features'); Add utils.specDir config key for customization."

    # ─── QA ENGINEER (18 findings) ─────────────────────────────────────────────

    - id: "A-QA-001"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: high
      category: "boundary"
      file: ".claude/hooks/utils.mjs"
      line: 395
      title: "getProjectDir() /tmp check fails on macOS due to /private/tmp symlink"
      description: |
        On macOS, /tmp is a symlink to /private/tmp. Node's resolve('/tmp/foo') returns
        '/private/tmp/foo', which does NOT start with the literal string '/tmp'. The guard condition
        !resolved.startsWith('/tmp') therefore falls through to process.cwd(). This silently breaks
        the boundary check for all test environments using mkdtempSync (which returns /tmp/... paths),
        and means the security fallback fires in normal operation on macOS dev machines.
      evidence: |
        Input: CLAUDE_PROJECT_DIR = '/tmp/myproject'
        On macOS: resolve('/tmp/myproject') → '/private/tmp/myproject'
        '/private/tmp/myproject'.startsWith('/tmp') → false
        Expected: returns '/private/tmp/myproject'
        Actual: returns process.cwd() — wrong directory
      fix_suggestion: "const tmpResolved = resolve('/tmp'); use !resolved.startsWith(tmpResolved) instead of !resolved.startsWith('/tmp')"

    - id: "A-QA-002"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: high
      category: "boundary"
      file: ".claude/hooks/utils.mjs"
      line: 391
      title: "getProjectDir() accepts CLAUDE_PROJECT_DIR=/tmp root — makes entire /tmp filesystem 'inside project'"
      description: |
        CLAUDE_PROJECT_DIR=/tmp (the root of /tmp) passes the startsWith guard and is returned.
        post-edit.mjs's project boundary check uses absPath.startsWith(projectDir) which becomes
        startsWith('/tmp'). Now every file in /tmp is 'inside the project' — ruff would be invoked
        on any .py file anywhere under /tmp.
      evidence: |
        CLAUDE_PROJECT_DIR = '/tmp' → getProjectDir() returns '/tmp'
        post-edit.mjs: '/tmp/etc/shadow'.startsWith('/tmp') → true
      fix_suggestion: "Require at least one level below /tmp: resolved.startsWith(tmpResolved + path.sep)"

    - id: "A-QA-003"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: high
      category: "boundary"
      file: ".claude/hooks/utils.mjs"
      line: 244
      title: "minimatch '**' requires intermediate directory — src/**/*.py does not match src/foo.py"
      description: |
        The minimatch function converts ** to .* in regex. The pattern src/**/*.py becomes
        ^src/.*/[^/]*\\.py$. Because .* includes the empty string AND requires a literal / after
        src/, src/foo.py does NOT match. Acknowledged in tests as 'known quirk' but causes real
        failures — any spec using common src/**/*.py pattern expecting standard glob semantics
        will deny edits to top-level files in that directory.
      evidence: |
        Spec: ## Allowed Files\n`src/**/*.py`
        Input file: 'src/models.py'
        Expected (standard glob): allowed = true
        Actual (current): allowed = false (^src/.*/[^/]*\\.py$ does not match 'src/models.py')
      fix_suggestion: "Convert src/**/*.py to ^src/(?:.*/)?[^/]*\\.py$ so ** matches zero or more path segments."

    - id: "A-QA-004"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: high
      category: "coverage-gap"
      file: ".claude/hooks/pre-edit.mjs"
      line: 149
      title: "LOC check uses process.cwd() for relative paths — silently bypassed in worktree context"
      description: |
        At line 149, absPath = filePath.startsWith('/') ? filePath : join(process.cwd(), filePath).
        In a git worktree scenario where cwd is the worktree directory, relative file paths resolve
        to non-existent paths. existsSync returns false, countLines is skipped, and the LOC check
        is silently bypassed. Files of any size are allowed through without warning.
      evidence: |
        Setup: hook runs from /worktrees/feature-xyz/, project at /project/
        Input file_path: 'src/main.py' (relative, 450 lines)
        absPath = '/worktrees/feature-xyz/src/main.py' → does not exist
        Expected: ASK at 400+ lines
        Actual: existsSync returns false → LOC check skipped
      fix_suggestion: "Replace with: const absPath = filePath.startsWith('/') ? filePath : join(getProjectDir(), filePath);"

    - id: "A-QA-005"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: high
      category: "negative-test"
      file: ".claude/hooks/pre-edit.mjs"
      line: 112
      title: "Missing test: spec whitelisting a contract file must still be blocked by protected-paths check"
      description: |
        The execution order is: (1) isFileAllowed() gate, (2) protected-paths check. The code is
        currently correct — if the spec allows tests/contracts/critical.py, the protected-paths check
        at step 2 still blocks it. But there is NO TEST verifying this invariant. If someone reorders
        the checks or adds an early return, this silently breaks and contract tests become editable.
      evidence: |
        Spec: ## Allowed Files\n`tests/contracts/critical.py`
        Input: file_path = 'tests/contracts/critical.py'
        isFileAllowed() → allowed: true (file is in spec)
        protected-paths check → should deny
        Expected: deny (protected path rule wins over spec)
        Actual: deny (currently correct, but zero test coverage for this interaction)
      fix_suggestion: "Add an explicit test: spec allows tests/contracts/foo.py, verify hook still returns deny."

    - id: "A-QA-006"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: medium
      category: "coverage-gap"
      file: ".claude/hooks/utils.mjs"
      line: 94
      title: "outputJson setTimeout not cleared after write callback — 500ms unnecessary hang in degraded environments"
      description: |
        The outputJson function registers both a write callback exit and a setTimeout(500ms) safety net.
        The timeout is never cleared when the callback fires. If process.stdout.write throws synchronously
        (EPIPE), the catch block calls process.exit(0) but the setTimeout lingers, causing the process
        to hang for 500ms after every pipe failure in broken environments. No test covers this scenario.
      evidence: |
        Input: pipe stdout to a process that closes immediately
        Expected: process exits immediately after write failure
        Actual: process hangs for 500ms due to lingering setTimeout
      fix_suggestion: "const t = setTimeout(() => process.exit(0), 500); process.stdout.write(data, () => { clearTimeout(t); process.exit(0); });"

    - id: "A-QA-007"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: medium
      category: "combination"
      file: ".claude/hooks/hooks.config.mjs"
      line: 52
      title: "Force-push regex does not block bare 'git push -f' with no explicit branch specified"
      description: |
        The force-push-to-protected-branches pattern requires \\b(develop|main)\\b to appear in the
        command. A bare 'git push -f' with no explicit branch is not blocked, even though the current
        tracking branch might be develop or main. This is a false negative — the hook cannot know
        the tracking branch without executing git.
      evidence: |
        Input: 'git push -f'  (no explicit branch, tracking branch is develop)
        Expected: deny (could be pushing to develop)
        Actual: allow (no develop/main match in lookahead)
      fix_suggestion: "Add a separate pattern for bare 'git push -f' and 'git push --force' (without explicit safe branch): ask for confirmation."

    - id: "A-QA-008"
      zone: "Zone A"
      persona: "qa-engineer"
      severity: medium
      category: "boundary"
      file: ".claude/hooks/validate-spec-complete.mjs"
      line: 12
      title: "stripCodeBlocks fails on code blocks containing text with triple-backtick sequences"
      description: |
        stripCodeBlocks uses /```[\\s\\S]*?```/g — a non-greedy match that stops at the FIRST closing
        triple-backtick. Code blocks containing text with triple backtick sequences cause premature
        termination, leaving part of the code block's contents in the stripped output. This can expose
        '- [ ]' patterns from inside code examples, causing false positive failures of the Impact Tree
        checkbox validation.
      evidence: |
        Input: spec containing ``` sh\n# run `` git commit `` here\n```
        Non-greedy stops at the first `` ` `` sequence within the block
        Expected: entire block stripped; Actual: partial strip
      fix_suggestion: "Use: /^```[^`\\n]*\\n[\\s\\S]*?\\n```$/gm or scan line by line for fence boundaries."


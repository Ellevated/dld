        Non-greedy match stops at first ``` inside code block.
        Can cause false positive Impact Tree checkbox failures.
      fix_suggestion: "Use line-by-line fence boundary scanning"
      source_ids: [A-QA-008]

  out_of_scope:
    - original_id: A-CR-010
      title: "Comment typo — missing slash on line 213"
      reason: "FALSE finding. Verified line 213 in source: 'return _config; // fail-safe: ...' — comment is properly formed with //. The finding fabricated a non-existent bug."

    - original_id: A-SEC-008
      title: "Protected path check ordering — always-allowed patterns bypass protected paths"
      reason: "FALSE finding. Incorrect control flow analysis. In pre-edit.mjs: isFileAllowed (which checks always-allowed) -> protected paths check. A .claude/ file passes isFileAllowed but then hits the protected paths check at line 133. isFileAllowed returning {allowed: true} means the pre-edit flow CONTINUES to the protected path check. No bypass exists."

    - original_id: A-CR-009
      title: "approvePrompt() sends JSON via async write path — inconsistent with allowTool() silent exit"
      reason: "By design. UserPromptSubmit hooks MUST return JSON {decision: 'approve'} per Claude Code protocol. approvePrompt() correctly uses outputJson. allowTool() is for PreToolUse hooks which use silent exit. Different hook types, different protocols."

    - original_id: A-SEC-009
      title: "Prompt guard complexity detection fails on Turkish locale due to toLowerCase()"
      reason: "Theoretical concern. Hooks run in Node.js server context where locale is controlled. Turkish locale dotless-i issue would require developer's system to be Turkish locale AND prompt to contain Turkish-specific uppercase I. Extremely unlikely in practice."

    - original_id: A-CR-007
      title: "SKILL_INDICATORS tested against promptLower without /i flag"
      reason: "Not a bug — SKILL_INDICATORS patterns are all lowercase and tested against already-lowercased input. Works correctly. The /i flag on COMPLEXITY_PATTERNS is redundant but harmless. Concern absorbed into F-021 (prompt-guard should use config)."

    - original_id: A-UX-003
      title: "SKILL_INDICATORS case sensitivity maintenance hazard"
      reason: "Duplicate of A-CR-007 concern, which is itself not a current bug. The maintenance hazard is addressed by F-021 (prompt-guard should use config)."

    - original_id: A-UX-006
      title: "ruff format failure silently swallowed"
      reason: "By design per ADR-004 (fail-safe). Post-edit hooks should never block on tool failures. Silent continuation is the correct behavior. Ruff errors are visible in the file itself."

    - original_id: A-SEC-010
      title: "Error log appends unsanitized error objects — log injection"
      reason: "Log is local-only (chmod 600), not parsed by any automated system. The 'injection' has no practical exploit path. Newlines in error messages are standard Node.js behavior."

    - original_id: A-SEC-005
      title: "Push-to-main regex edge cases with complex refspecs"
      reason: "Vague finding with no concrete repro. 'Complex scenarios remain untested' is not actionable without specific failing inputs."

    - original_id: A-ARCH-007
      title: "Force push with --force-with-lease to develop allows data loss in stale-tracking-ref scenarios"
      reason: "Known limitation of git --force-with-lease itself, not a hook bug. The hook correctly allows --force-with-lease as the 'safe' alternative to --force. Changing this would block the documented workflow."

    - original_id: A-QA-005
      title: "Missing test: spec whitelisting a contract file must still be blocked by protected-paths check"
      reason: "Test coverage request, not a bug finding. The code is correct (verified). Appropriate for a separate testing task."

    - original_id: A-JR-007
      title: "loadConfig async TOCTOU — concurrent calls can load config twice"
      reason: "Each hook runs as a separate Node.js process (spawned by run-hook.mjs). There is only ONE call to loadConfig() per process. Concurrent calls cannot happen in production."

    - original_id: A-ARCH-008
      title: "loadConfig async TOCTOU — concurrent calls between check and assignment"
      reason: "Duplicate of A-JR-007. Same incorrect assumption about concurrent calls."

    - original_id: A-QA-014
      title: "--ff-only bypass check is case-sensitive while surrounding patterns use /i"
      reason: "Git itself is case-sensitive for flags. --FF-ONLY is not a valid git flag. Case-sensitive check is correct."

    - original_id: A-QA-016
      title: "SKILL_INDICATORS bypass not tested with uppercase skill names"
      reason: "Test coverage request, not a bug. Behavior is correct (toLowerCase + lowercase patterns). Addressed by F-021."

    - original_id: A-SEC-007
      title: "ReDoS vulnerability in extractAllowedFiles regex"
      reason: "Overstated. The regex uses non-greedy quantifier which is linear in most engines. Node.js V8 regex engine handles this pattern without catastrophic backtracking. Alternation \\n## or \\s*$ does not create exponential branching."

    - original_id: A-QA-018
      title: "DEBUG constant captured at module import time — DLD_HOOK_DEBUG bleeds into tests"
      reason: "Test infrastructure concern, not a hook bug. Test helpers should control env vars, which is a test setup issue."

    - original_id: A-QA-015
      title: "inferSpecFromBranch relative path — duplicate"
      reason: "Merged into F-004 (A-ARCH-013 kept as primary)"


        No validation that root is a real directory.
        Malformed output -> garbage path -> hooks silently pass.
        Fail-open if git output format changes.
      fix_suggestion: "Add existsSync(root) check. Use anchored regex /^worktree\\s+/"
      source_ids: [A-SEC-011, A-UX-014, A-JR-010]


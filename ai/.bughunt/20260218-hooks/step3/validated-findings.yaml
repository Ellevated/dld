    - id: F-036
      group: "Minor Quality"
      priority: P3
      severity: low
      file: ".claude/hooks/validate-spec-complete.mjs"
      line: 39
      title: "validate-spec-complete only checks first staged spec file — additional specs skip Impact Tree check"
      description: >
        const specFile = stagedFiles.split('\n').find(f => ...);
        Array.find returns only first match — additional staged specs unchecked.
        Edge case: bulk commits with multiple specs.
      fix_suggestion: "Use Array.filter() and check all staged spec files"
      source_ids: [A-QA-017]

    - id: F-037
      group: "Minor Quality"
      priority: P3
      severity: low
      file: ".claude/hooks/pre-edit.mjs"
      line: 111
      title: "Empty string CLAUDE_CURRENT_SPEC_PATH triggers branch inference instead of disabling enforcement"
      description: >
        const specPath = process.env.CLAUDE_CURRENT_SPEC_PATH || inferSpecFromBranch();
        '' || inferSpecFromBranch() -> inference runs (JS falsy).
        Operator intending to disable enforcement by setting empty string gets inference instead.
      fix_suggestion: "Use explicit undefined check instead of ||"
      source_ids: [A-ARCH-010]

    - id: F-038
      group: "Minor Quality"
      priority: P3
      severity: low
      file: ".claude/hooks/pre-edit.mjs"
      line: 154
      title: "LOC warnThreshold=1.0 makes warning unreachable — hard block fires first"
      description: >
        const warnLoc = Math.floor(maxLoc * warnThreshold);
        warnThreshold=1.0: warnLoc = maxLoc
        loc >= maxLoc fires before loc >= warnLoc -> no warning ever shown.
        Undocumented config edge case.
      fix_suggestion: "Document that warnThreshold must be < 1.0, or cap: Math.min(warnLoc, maxLoc - 1)"
      source_ids: [A-JR-012]


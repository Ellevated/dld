        session-end is the only hook that does not use loadConfig().
        Minor inconsistency with the rest of the hooks configuration system.
      fix_suggestion: "Add sessionEnd.pendingThreshold to hooks.config.mjs"
      source_ids: [A-UX-009]

    - id: F-035
      group: "Minor Quality"
      priority: P3
      severity: low
      file: ".claude/hooks/pre-edit.mjs"
